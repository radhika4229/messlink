server:
  port: 8083

node:
  id: ${NODE_ID:NODE_C}
  neighbors:
    - id: NODE_A
      url: ${NODE_A_WS_URL:ws://localhost:8081/ws/peer}
    - id: NODE_B
      url: ${NODE_B_WS_URL:ws://localhost:8082/ws/peer}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/messlink_node_c}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update

logging:
  level:
    com.messlink: DEBUG